name: Build and Release

on:
  release:
    types: [created]

permissions:
  contents: write
  releases: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nexcrypt
            asset_name: nexcrypt-linux-amd64

          - os: windows-latest
            artifact_name: nexcrypt.exe
            asset_name: nexcrypt-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      # --- DEPENDENCY INSTALLATION ---

      # Linux Dependency
      - name: Install libsodium (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev pkg-config

      # Windows Dependency
      - name: Install libsodium (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install libsodium:x64-windows-static
          echo "CMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_INSTALLATION_ROOT }}/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV
          echo "VCPKG_TARGET_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV
        shell: pwsh 
        

      # --- CMAKE CONFIGURATION (OS SPECIFIC) ---

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=$env:CMAKE_TOOLCHAIN_FILE

      # --- BUILD & PACKAGE ---

      - name: Build
        run: cmake --build build --config Release

      - name: Rename and Package Artifact
        shell: bash
        run: |
          mkdir -p release
          if [ -f build/${{ matrix.artifact_name }} ]; then
            cp build/${{ matrix.artifact_name }} release/${{ matrix.asset_name }}
          elif [ -f build/Release/${{ matrix.artifact_name }} ]; then
            cp build/Release/${{ matrix.artifact_name }} release/${{ matrix.asset_name }}
          else
            echo "Error: Binary not found!" && exit 1
          fi

      # --- AUTOMATED RELEASE UPLOAD ---

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}