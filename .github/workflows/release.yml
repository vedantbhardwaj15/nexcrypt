name: Build and Release

on:
  release:
    types: [created]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nexcrypt
            asset_name: nexcrypt-linux-amd64

          - os: windows-latest
            artifact_name: nexcrypt.exe
            asset_name: nexcrypt-windows-amd64.exe

          - os: macos-latest
            artifact_name: nexcrypt
            asset_name: nexcrypt-macos-arm64

    steps:
      - uses: actions/checkout@v4

      # Linux Dependency
      - name: Install libsodium (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev pkg-config

      # macOS Dependency
      - name: Install libsodium (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libsodium pkg-config

      # Windows Dependency
      - name: Install libsodium (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install libsodium:x64-windows-static
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV
          echo "VCPKG_TARGET_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV
        shell: pwsh

      # Cleaner Configuration Step (Windows will automatically use CMAKE_TOOLCHAIN_FILE from env)
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Rename and Package Artifact
        shell: bash
        run: |
          mkdir -p release
          if [ -f build/${{ matrix.artifact_name }} ]; then
            cp build/${{ matrix.artifact_name }} release/${{ matrix.asset_name }}
          elif [ -f build/Release/${{ matrix.artifact_name }} ]; then
            cp build/Release/${{ matrix.artifact_name }} release/${{ matrix.asset_name }}
          else
            echo "Error: Binary not found!" && exit 1
          fi

      # Upload directly into your official Release asset list
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}